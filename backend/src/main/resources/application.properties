# Application Configuration
spring.application.name=quote-negotiation-assistant
server.port=8080

# Database Configuration
# For Development: H2 (uncomment these lines)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# For Production: PostgreSQL (uncomment these lines and comment H2 above)
#spring.datasource.url=jdbc:postgresql://localhost:5432/quote_negotiation
#spring.datasource.username=postgres
#spring.datasource.password=password
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL, use: org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.quote=DEBUG
logging.level.org.springframework.web=DEBUG

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
